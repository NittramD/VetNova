# ms-mascotas
# Autor: Martin Diaz
#
# Microservicio para gestionar el registro de pacientes.
# Crear BD "vetnova_mascotas_db" en MySQL antes de arrancar.

server.port=8086
spring.application.name=ms-mascotas

spring.datasource.url=jdbc:mysql://localhost:3306/vetnova_mascotas_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true