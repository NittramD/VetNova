# ms-agenda
# Autor: Martin Diaz
#
# Microservicio de Agenda: gestiona citas, reprogramaciones y cancelaciones.
# Crear BD "vetnova_agenda_db" en MySQL antes de arrancar.

server.port=8084
spring.application.name=ms-agenda

spring.datasource.url=jdbc:mysql://localhost:3306/vetnova_agenda_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true