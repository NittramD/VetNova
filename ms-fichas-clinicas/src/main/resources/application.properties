spring.application.name=ms-fichas-clinicas
# ms-fichas-clinicas
# Autor: Martin Diaz
#
# Microservicio de uso veterinario para historiales y recetas.
# Crear BD "vetnova_fichas_db" en MySQL antes de arrancar.

server.port=8085
spring.application.name=ms-fichas-clinicas

spring.datasource.url=jdbc:mysql://localhost:3306/vetnova_fichas_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true